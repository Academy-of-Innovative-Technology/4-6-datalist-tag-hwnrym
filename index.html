<!DOCTYPE html>
<html>


<head>
 <meta charset="utf-8">
 <meta name="viewport" content="width=device-width">
 <title>4.6 datalist tags</title>
 <link href="style.css" rel="stylesheet" type="text/css" />
</head>


<body>


 <form name="example" action="#" method="POST">
     <label for="language">Select or type a language:</label>
     <input list="languages" name="language" id="language">
     <datalist id="languages">
         <option value="English">
         <option value="Spanish">
         <option value="Chinese">
         <option value="Japanese">
     </datalist>
     <br><br>
     <input type="submit">
 </form>


 <hr>


 <!--exercise 1-->
 <form action="#" method="POST">
     <label for="sneakers">Select a Sneaker Brand:</label>
     <input list="brands" id="sneakers" name="sneakers">
     
     <datalist id="brands">
         <option value="Nike">
         <option value="New Balance">
         <option value="Skechers">
         <option value="Adidas">
         <option value="Puma">
         <option value="Converse">
         <option value="Vans">
     </datalist>

     <input type="submit">
 </form>

</html>
